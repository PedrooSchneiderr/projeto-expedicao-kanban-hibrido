<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Expedição Kanban</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="CSS/styles.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { darkBg: '#0f172a', darkCard: '#1e293b', darkBorder: '#334155' } } } }
    </script>
</head>
<body class="bg-darkBg text-slate-200 h-screen flex items-center justify-center font-sans">
    <div class="bg-darkCard p-12 rounded-3xl border border-darkBorder shadow-2xl w-full max-w-md">
        <div class="flex flex-col items-center mb-10">
            <div class="bg-blue-600 p-4 rounded-2xl mb-4 shadow-lg shadow-blue-500/20">
                <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14H11V21L20 10H13Z"/></svg>
            </div>
            <h1 class="text-3xl font-black text-white italic">TSPD EXPEDITION</h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-2">Acesso Restrito</p>
        </div>
        
        <div id="auth-container">
            <form id="login-form" class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest">Usuário</label>
                    <input type="text" id="login-username" required class="w-full bg-slate-900 border border-darkBorder rounded-2xl px-5 py-4 text-white focus:ring-2 focus:ring-blue-500 transition outline-none">
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest">Senha</label>
                    <input type="password" id="login-password" required class="w-full bg-slate-900 border border-darkBorder rounded-2xl px-5 py-4 text-white focus:ring-2 focus:ring-blue-500 transition outline-none">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl transition transform active:scale-95 uppercase tracking-tighter">Entrar no Painel</button>
                <p class="text-xs text-center text-slate-500 font-bold">Solicitar acesso? <a href="#" id="show-signup" class="text-blue-500 ml-1">Clique aqui</a></p>
            </form>

            <form id="signup-form" class="space-y-6 hidden">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest">Username</label>
                    <input type="text" id="signup-username" required class="w-full bg-slate-900 border border-darkBorder rounded-2xl px-5 py-4 text-white">
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest">E-mail de Trabalho</label>
                    <input type="email" id="signup-email" required class="w-full bg-slate-900 border border-darkBorder rounded-2xl px-5 py-4 text-white transition outline-none">
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest">Senha</label>
                    <input type="password" id="signup-password" required class="w-full bg-slate-900 border border-darkBorder rounded-2xl px-5 py-4 text-white">
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 rounded-2xl shadow-xl transition uppercase tracking-tighter">Enviar Registro</button>
                <p class="text-xs text-center text-slate-500 font-bold">Já tem conta? <a href="#" id="show-login" class="text-blue-500 ml-1">Voltar</a></p>
            </form>
        </div>
    </div>
    <script src="JS/auth.js"></script>
</body>
</html>
